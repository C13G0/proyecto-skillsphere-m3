# ===========================
# PERFIL DE DESARROLLO (H2 en Memoria)
# ===========================
# Usar H2 en lugar de PostgreSQL para desarrollo sin BD externa

# Conexión a H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (opcional, para ver BD en http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# ===========================
# Configuración de JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Inicialización de SQL
spring.sql.init.mode=never
