services:
  - type: web
    name: skillsphere-backend-api
    runtime: docker
    plan: free
    envVars:
      - key: DB_URL
        fromDatabase:
          name: skillsphere-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: skillsphere-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: skillsphere-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: skillsphere-db
    plan: free
    databaseName: skillsphere_app_db
    user: skillsphere_user